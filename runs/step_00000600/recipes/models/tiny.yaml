model:
  max_sequence_length: 5096
  num_layers: 4
  hidden_size: 128
  intermediate_size: 448
  activation: swiglu
  tie_word_embeddings: true

attention:
  num_attention_heads: 4
  value_head_dim: 32
  layer_types:
    - local_sliding
    - global
  local_sliding:
    window_size: 10
    num_key_value_heads: 2
    qk_head_dim: 32
    qk_logits_softcap: 50
    rope:
      dim: 24
      theta: 10000
      scale: 1.0
  global:
    num_key_value_heads: 4
    qk_head_dim: 32
    qk_logits_softcap: 50
    rope:
      dim: 12
      theta: 100000
      scale: 1.5

normalization:
  post_attention: true
  post_ffn: true
  qk_norm:
    enabled: true
    learnable_scale: true

output:
  vocab_logits_softcap: null

runtime:
  gradient_checkpointing: true
  flash_attention: true
  fused_attention: false
